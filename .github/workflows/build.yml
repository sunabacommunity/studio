name: Build
on:
  workflow_call:
  push:
  pull_request:
  merge_group:

  schedule:
    - cron: "0 10 * * *" # run at 10 AM UTC/ 2 AM AKDT
    #- cron: '0 21 * * *' # run at 9 PM UTC/ 1 PM AKDT

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        build_type: [
          #"debug", 
          "release"
        ]
        config:
          - {
              name: "🍏 macOS",
              target: mac-universal,
              os: macos-latest,
              #pkgformat: dmg,
              pkgformat: none,
            }
          - {
              name: "🐧 Linux",
              target: linux-x86_64,
              os: ubuntu-latest,
              pkgformat: deb,
            }
          - {
              name: "🪟 Windows",
              target: windows-x86_64,
              os: ubuntu-latest,
              pkgformat: nsis,
            }
          #- { name: '💪🪟 Windows Arm', target: windows-arm64, os: ubuntu-latest, pkgformat: nsis }

    name: 🛠 Build / ${{ matrix.config.name }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          # Version must include major, minor, and patch, and be >= 4.0.0
          # Pre-release label is optional.
          version: 4.6.1 # also valid: 4.0.0.rc1 or 4.0.0 or "global.json", etc
          # Use .NET-enabled version of Godot (the default is also true).
          use-dotnet: true
          # Include the Godot Export Templates (the default is false).
          include-templates: true

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 19

      - name: Install Dependencies (macOS)
        if: matrix.config.os == 'macos-latest'
        run: brew install haxe

      - name: Install Dependencies (Linux)
        if: matrix.config.os == 'ubuntu-latest' || matrix.config.os == 'ubuntu-latest-m'
        run: |
          sudo apt-get update
          sudo apt-get install -y haxe nsis dpkg-dev flatpak flatpak-builder
        
      - name: Setup Flathub (Linux)
        if: matrix.config.target == 'linux-x86_64'
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install flathub org.freedesktop.Platform/x86_64/25.08 -y
          flatpak install flathub org.freedesktop.Sdk/x86_64/25.08 -y

      - name: Setup Haxelib
        run: |
          haxelib setup ${{ github.workspace }}/.hxlib

      - name: Checkout Sunaba
        uses: actions/checkout@v4
        with:
          repository: sunabacommunity/libsunaba
          path: ${{github.workspace}}/libsunaba
          #token: ${{ secrets.ACCESS_TOKEN }}
          persist-credentials: true`

      - name: Checkout Gamepak
        uses: actions/checkout@v4
        with:
          repository: sunabacommunity/gamepak
          path: ${{github.workspace}}/gamepak
          #token: ${{ secrets.ACCESS_TOKEN }}
          persist-credentials: true

      - name: Install Haxelib Dependencies
        run: |
          haxelib install hxnodejs
          haxelib install msgpack-haxe
          haxelib dev gamepak ${{github.workspace}}/gamepak
          haxelib dev libsunaba ${{github.workspace}}/libsunaba

      - name: Download Libraries
        uses: robinraju/release-downloader@v1
        with:
          # The source repository path.
          # Expected format {owner}/{repo}
          # Default: ${{ github.repository }}
          repository: sunabacommunity/libsunaba
          latest: true
          tag: "0.7.1"
          fileName: "godot-cpp-template.zip"
          out-file-path: "dl"
          extract: false
          #token: ${{ secrets.ACCESS_TOKEN }}

      - name: Install Libraries
        run: |
          ${{ github.workspace }}/build.sh libupdate ${{ github.workspace }}/dl/godot-cpp-template.zip


      #- name: Install Windows Haxe Toolchain
      #  if: matrix.config.target == 'windows-x86_64'
      #  run: |
      #    ${{ github.workspace }}/build.sh hxupd --platform=windows

      - name: Build Project
        run: |
          ${{ github.workspace }}/build.sh publish --${{ matrix.build_type }} --target=${{ matrix.config.target }} --pkgformat=${{ matrix.config.pkgformat }} --godot-command=godot
      
      - name: Build Flatpak (Linux)
        if: matrix.config.target == 'linux-x86_64'
        run: |
          ${{ github.workspace }}/build.sh --skip --${{ matrix.build_type }} --target=${{ matrix.config.target }} --pkgformat=flatpak --install --single-file-bundle

      - name: Build Project (Zip) (Linux Release)
        if: matrix.config.target == 'linux-x86_64' && matrix.build_type == 'release'
        run: |
          cd ${{ github.workspace }}/bin/linux-x86_64-release
          zip -r -0 ${{ github.workspace }}/bin/linux-x86_64-release.zip *

      - name: Build Project (Zip) (Linux Debug)
        if: matrix.config.target == 'linux-x86_64' && matrix.build_type == 'debug'
        run: |
          cd ${{ github.workspace }}/bin/linux-x86_64-debug
          zip -r -0 ${{ github.workspace }}/bin/linux-x86_64-debug.zip *
      
      - name: Build Project (Zip) (Mac Release)
        if: matrix.config.target == 'mac-universal' && matrix.build_type == 'release'
        run: |
          cd ${{ github.workspace }}/bin/mac-universal-release
          zip -r -0 ${{ github.workspace }}/bin/mac-universal-release.zip *

      - name: Build Project (Zip) (Mac Debug)
        if: matrix.config.target == 'mac-universal' && matrix.build_type == 'debug'
        run: |
          cd ${{ github.workspace }}/bin/mac-universal-debug
          zip -r -0 ${{ github.workspace }}/bin/mac-universal-debug.zip *
        
      - name: Build DMG (Mac)
        if: matrix.config.target == 'mac-universal'
        run: |
          ${{ github.workspace }}/build.sh --skip --${{ matrix.build_type }} --target=${{ matrix.config.target }} --pkgformat=dmg

      - name: Build Project (Zip) (Windows Release)
        if: matrix.config.target == 'windows-x86_64' && matrix.build_type == 'release'
        run: |
          cd ${{ github.workspace }}/bin/windows-x86_64-release
          zip -r -0 ${{ github.workspace }}/bin/windows-x86_64-release.zip *

      - name: Build Project (Zip) (Windows Debug)
        if: matrix.config.target == 'windows-x86_64' && matrix.build_type == 'debug'
        run: |
          cd ${{ github.workspace }}/bin/windows-x86_64-debug
          zip -r -0 ${{ github.workspace }}/bin/windows-x86_64-debug.zip *

      - name: Upload artifact (Zip)
        #if: matrix.config.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.config.target }}-${{ matrix.build_type }}-zip
          path: |
            ${{ github.workspace }}/bin/*.zip

      - name: Upload artifact 
        #if: matrix.config.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.config.target }}-${{ matrix.build_type }}-installer
          path: |
            ${{ github.workspace }}/bin/*.exe
            ${{ github.workspace }}/bin/*.deb
            ${{ github.workspace }}/bin/*.flatpak
            ${{ github.workspace }}/bin/*.dmg
      #- name: Upload macOS artifact
      #  if: matrix.config.os == 'macos-latest'
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: ${{ github.event.repository.name }}-${{ matrix.config.target }}-${{ matrix.build_type }}
      #    path: |
      #      ${{ github.workspace }}/bin/*.dmg
  #merge:
  #  runs-on: ubuntu-latest-m
  #  needs: build
  #  steps:
  #    - name: Merge Artifacts
  #      uses: actions/upload-artifact/merge@v4
  #      with:
  #        name: ${{ github.event.repository.name }}
  #        pattern: ${{ github.event.repository.name }}-*
  deployToSteam:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: ${{ github.event.repository.name }}-windows-x86_64-release-zip
      - uses: actions/download-artifact@v5
        with:
          name: ${{ github.event.repository.name }}-linux-x86_64-release-zip
      - uses: actions/download-artifact@v5
        with:
          name: ${{ github.event.repository.name }}-mac-universal-release-zip
      - name: Create Build Directory
        run: |
          mkdir build
      - name: Unzip Linux Build
        run: |
          unzip ${{ github.workspace }}/linux-x86_64-release.zip -d ./build/linux-x86_64-release 
      - name: Unzip Windows Build
        run: |
          unzip ${{ github.workspace }}/windows-x86_64-release.zip -d ./build/windows-x86_64-release 
      - name: Unzip Mac Build
        run: |
          unzip ${{ github.workspace }}/mac-universal-release.zip -d ./build/mac-universal-release
      - uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: 2684270
          buildDescription: v0.7.11
          rootPath: build
          depot1Path: mac-universal-release 
          depot3Path: windows-x86_64-release 
          depot4Path: linux-x86_64-release 
          releaseBranch: nightly
